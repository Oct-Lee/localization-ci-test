name: Localization Quality Gate


on:
  pull_request:


jobs:

  spell-check:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: cspell
      uses: streetsidesoftware/cspell-action@v6


  grammar-check:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4


    - name: Start LanguageTool
      run:
        docker run -d \
        -p 8010:8010 \
        silviof/docker-languagetool


    - name: Grammar Check
      run:
        python grammar_check.py