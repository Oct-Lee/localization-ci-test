name: Localization Check

on:
  push:
  pull_request:

jobs:
  localization-check:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Install cspell
      run: |
        npm install -g cspell

    - name: Run cspell
      run: |
        cspell "src/**/*"
