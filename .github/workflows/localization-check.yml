name: Localization Quality Gate

on:
  push:
    branches:
      - main

  pull_request:


jobs:

  spell-check:

    name: Spell Check (cspell)

    runs-on: ubuntu-latest


    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Install cspell
        run: |
          npm install -g cspell


      - name: Run cspell
        run: |
          cspell "src/**/*"



  grammar-check:

    name: Grammar Check (LanguageTool)

    runs-on: ubuntu-latest


    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Start LanguageTool Server
        run: |
          docker run \
            -d \
            --name languagetool \
            -p 8010:8010 \
            silviof/docker-languagetool


      - name: Wait LanguageTool Ready
        run: |
          sleep 20


      - name: Run LanguageTool Check
        run: |
          python3 << 'EOF'
          import json
          import sys
          import urllib.request
          import urllib.parse
          import re


          # Example extracted user-facing text
          text = """
          camera[{camera_id}] not Founded.
          Please check whether the 'camera_id' parameter of the configration file is correct.
          Camera have started.
          """


          #
          # Replace placeholders before grammar analysis
          #
          check_text = re.sub(
              r"\{[^}]+\}",
              "DEVICE_VALUE",
              text
          )


          data = urllib.parse.urlencode(
              {
                  "language": "en-US",
                  "text": check_text
              }
          ).encode("utf-8")


          request = urllib.request.Request(
              "http://localhost:8010/v2/check",
              data=data,
              method="POST"
          )


          response = urllib.request.urlopen(request)


          result = json.loads(
              response.read().decode("utf-8")
          )


          matches = result.get(
              "matches",
              []
          )


          if matches:

              print("")
              print(
                  "Localization language issues found:"
              )
              print("")


              for item in matches:

                  offset = item.get(
                      "offset",
                      0
                  )

                  length = item.get(
                      "length",
                      0
                  )


                  wrong_text = check_text[
                      offset:
                      offset + length
                  ]


                  print(
                      "---------------------------"
                  )


                  print(
                      "Text:",
                      wrong_text
                  )


                  print(
                      "Message:",
                      item.get(
                          "message"
                      )
                  )


                  print(
                      "Rule:",
                      item.get(
                          "rule",
                          {}
                      ).get(
                          "id"
                      )
                  )


                  replacements = item.get(
                      "replacements",
                      []
                  )


                  if replacements:

                      print(
                          "Suggestion:",
                          [
                              r.get("value")
                              for r in replacements[:5]
                          ]
                      )


              print("")

              sys.exit(1)


          print(
              "LanguageTool check passed"
          )


          EOF



  placeholder-check:

    name: Placeholder Check

    runs-on: ubuntu-latest


    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Check Placeholder Consistency
        run: |
          python3 << 'EOF'
          import re
          import sys


          #
          # Example extracted text
          #
          text = """
          camera[{camera_id}] not Founded.
          Please check whether the 'camera_id' parameter is correct.
          """


          placeholders = re.findall(
              r"\{[^}]+\}",
              text
          )


          print(
              "Found placeholders:"
          )


          for item in placeholders:
              print(
                  " ",
                  item
              )


          required = [
              "{camera_id}"
          ]


          for item in required:

              if item not in placeholders:

                  print(
                      "Missing placeholder:",
                      item
                  )

                  sys.exit(1)


          print(
              "Placeholder check passed"
          )


          EOF