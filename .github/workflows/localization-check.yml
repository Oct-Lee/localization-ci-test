name: Localization Quality Gate

on:
  pull_request:
  push:
    branches:
      - main


jobs:

  localization-check:

    runs-on: ubuntu-latest


    steps:

    - name: Checkout
      uses: actions/checkout@v4


    # 英文拼写检查
    - name: Spell Check
      uses: streetsidesoftware/cspell-action@v6
      with:
        files: |
          src/**/*.py


    # LanguageTool
    - name: Start LanguageTool
      run: |
        docker run \
          -d \
          --name languagetool \
          -p 8010:8010 \
          silviof/docker-languagetool


    - name: Grammar Check
      run: |
        sleep 20

        curl \
        -X POST \
        -d "language=en-US" \
        --data-urlencode \
        "text=Camera have started sucessfully" \
        http://localhost:8010/v2/check