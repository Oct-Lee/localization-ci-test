name: Localization Quality Gate

on:
  push:
    branches:
      - main

  pull_request:


jobs:

  spell-check:

    name: Spell Check (cspell)

    runs-on: ubuntu-latest


    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Install cspell
        run: |
          npm install -g cspell


      - name: Run cspell
        run: |
          cspell "src/**/*"



  grammar-check:

    name: Grammar Check (LanguageTool)

    runs-on: ubuntu-latest


    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Start LanguageTool Server
        run: |
          docker run \
            -d \
            --name languagetool \
            -p 8010:8010 \
            silviof/docker-languagetool


      - name: Wait LanguageTool Ready
        run: |
          sleep 20


      - name: Run LanguageTool Check
        run: |
          python3 << 'EOF'
          import json
          import sys
          import urllib.request
          import urllib.parse


          # Simulate extracted user-facing text
          text = """
          camera[{camera_id}] not Founded.
          Please check whether the 'camera_id' parameter of the configration file is correct
          """


          data = urllib.parse.urlencode(
              {
                  "language": "en-US",
                  "text": text
              }
          ).encode("utf-8")


          request = urllib.request.Request(
              "http://localhost:8010/v2/check",
              data=data,
              method="POST"
          )


          response = urllib.request.urlopen(request)

          result = json.loads(
              response.read().decode("utf-8")
          )


          matches = result.get("matches", [])


          if matches:

              print("")
              print("Localization grammar issues found:")
              print("")


              for item in matches:

                  offset = item.get("offset")
                  length = item.get("length")

                  wrong_text = text[
                      offset:offset + length
                  ]


                  print("---------------------------")

                  print(
                      "Text:",
                      wrong_text
                  )

                  print(
                      "Message:",
                      item.get("message")
                  )


                  replacements = item.get(
                      "replacements",
                      []
                  )


                  if replacements:

                      print(
                          "Suggestion:",
                          [
                              r.get("value")
                              for r in replacements[:5]
                          ]
                      )


                  print(
                      "Rule:",
                      item.get("rule", {}).get("id")
                  )


              print("")
              sys.exit(1)


          print(
              "No grammar issues found"
          )

          EOF



  placeholder-check:

    name: Placeholder Check

    runs-on: ubuntu-latest


    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Check placeholders
        run: |
          python3 << 'EOF'
          import re
          import sys


          source = """
          camera[{camera_id}] not Founded.
          Please check whether the 'camera_id' parameter of the configration file is correct
          """


          placeholders = re.findall(
              r"\{[^}]+\}",
              source
          )


          print(
              "Detected placeholders:",
              placeholders
          )


          if "{camera_id}" not in placeholders:

              print(
                  "Missing placeholder: {camera_id}"
              )

              sys.exit(1)


          print(
              "Placeholder check passed"
          )

          EOF