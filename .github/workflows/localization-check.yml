name: Localization Quality Gate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  localization-quality-gate:
    name: Localization Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: npm install

      - name: Start LanguageTool
        run: |
          docker run -d --name languagetool -p 8010:8010 silviof/docker-languagetool

      - name: Extract user-facing strings
        id: extract
        run: |
          python3 scripts/extract_messages.py \
            --root . \
            -o out/texts.jsonl

      - name: Upload extracted catalog
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: texts-jsonl
          path: out/texts.jsonl

      # Run all checks even if one fails, so the log shows every finding.
      # Final "Gate result" step blocks the job if any check failed.
      - name: Consistency check
        id: consistency
        if: always() && steps.extract.outcome == 'success'
        continue-on-error: true
        run: python3 scripts/check_consistency.py -i out/texts.jsonl

      - name: Spell check (cspell)
        id: spelling
        if: always() && steps.extract.outcome == 'success'
        continue-on-error: true
        run: python3 scripts/check_spelling.py -i out/texts.jsonl

      - name: Grammar check (LanguageTool)
        id: grammar
        if: always() && steps.extract.outcome == 'success'
        continue-on-error: true
        env:
          LQ_LT_ENDPOINT: http://localhost:8010/v2/check
          # Grammar findings block the PR / push (same as spelling).
          LQ_STRICT_GRAMMAR: "1"
        run: python3 scripts/check_grammar.py -i out/texts.jsonl

      - name: Gate result
        if: always() && steps.extract.outcome == 'success'
        run: |
          echo "consistency=${{ steps.consistency.outcome }}"
          echo "spelling=${{ steps.spelling.outcome }}"
          echo "grammar=${{ steps.grammar.outcome }}"

          failed=0
          if [ "${{ steps.consistency.outcome }}" != "success" ]; then
            echo "::error::Consistency check failed"
            failed=1
          fi
          if [ "${{ steps.spelling.outcome }}" != "success" ]; then
            echo "::error::Spell check failed"
            failed=1
          fi
          if [ "${{ steps.grammar.outcome }}" != "success" ]; then
            echo "::error::Grammar check failed"
            failed=1
          fi

          if [ "$failed" -ne 0 ]; then
            echo "Localization Quality Gate FAILED — consistency / spelling / grammar must all pass."
            exit 1
          fi

          echo "Localization Quality Gate passed."
